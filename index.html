<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數獨解題神器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>數獨解題神器</h1>
        <p>在下方輸入已知的數字，點擊「解題」來獲得解答。</p>
        
        <div id="sudoku-grid" class="grid">
            <!-- JavaScript 會在這裡生成 81 個輸入框 -->
        </div>

        <div class="controls">
            <button id="solve-btn" class="primary-btn">解題</button>
            <button id="clear-btn" class="secondary-btn">清除</button>
            <button id="demo-btn" class="demo-btn">測試範例</button>
            <input type="file" id="upload-input" accept="image/*" style="display: none;">
            <button id="upload-btn" class="upload-btn">上傳圖片</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <!-- 載入中畫面 -->
    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-text" style="margin-top: 15px; font-weight: bold; color: #333;">處理中...</p>
    </div>

    <!-- 引入 OpenCV.js 作為圖像處理與網格裁切引擎 -->
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="window.onOpenCvReady();" type="text/javascript"></script>
    <!-- 引入 Tesseract.js 作為圖像辨識引擎 -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
